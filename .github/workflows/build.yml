name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code নামাও
        uses: actions/checkout@v4

      - name: Java 17 সেটআপ করো
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle Wrapper JAR ডাউনলোড করো
        run: |
          mkdir -p gradle/wrapper
          curl -L https://github.com/nicowillis/gradle-wrapper-jar/raw/main/gradle-wrapper.jar \
          -o gradle/wrapper/gradle-wrapper.jar

      - name: gradlew কে permission দাও
        run: chmod +x gradlew

      - name: APK Build করো
        run: ./gradlew assembleDebug

      - name: APK আপলোড করো
        uses: actions/upload-artifact@v4
        with:
          name: AlarmApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
