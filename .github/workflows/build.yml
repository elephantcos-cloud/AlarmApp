name: Build APK

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Code নামাও
        uses: actions/checkout@v4

      - name: Java 17 সেটআপ করো
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Gradle ডাউনলোড ও Wrapper তৈরি করো
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.2/bin/gradle wrapper --gradle-version 8.2 --distribution-type bin
          chmod +x gradlew

      - name: APK Build করো
        run: ./gradlew assembleDebug

      - name: APK আপলোড করো
        uses: actions/upload-artifact@v4
        with:
          name: AlarmApp-APK
          path: app/build/outputs/apk/debug/app-debug.apk
